# TrustRate — lancement local, SANS rien d'autre sur votre poste que ce fichier.
#
#   docker compose -f docker-compose.hub.yml up --build
#
# Docker va chercher lui-même le code sur GitHub, construit l'image, lance la
# base PostgreSQL et le site. Tout vit dans Docker (images, base de données),
# rien n'est écrit à côté de ce fichier.
#
#   Le site        : http://localhost:8000
#   Le back-office : http://localhost:8000/admin   (admin / admin)
#
# Mise à jour après un changement du code sur GitHub :
#   docker compose -f docker-compose.hub.yml build --no-cache web
#   docker compose -f docker-compose.hub.yml up
#
# Tout arrêter : Ctrl+C puis
#   docker compose -f docker-compose.hub.yml down        (garde la base)
#   docker compose -f docker-compose.hub.yml down -v     (efface aussi la base)
#
# Identifiants ci-dessous = développement local UNIQUEMENT.

name: trustrate

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit_local_dev
      POSTGRES_DB: credit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build:
      # Le code est récupéré directement depuis GitHub par Docker :
      context: https://github.com/Coupain86/FL_Compar.git
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://credit:credit_local_dev@db:5432/credit
      SEED_ON_START: "1"          # offres de démo au premier démarrage
      MIN_COHORT: "8"             # offres comparables minimum pour un verdict chiffré
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/sante"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  pgdata:
