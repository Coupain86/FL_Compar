# TrustRate — lancement local avec CE FICHIER UNIQUEMENT sur votre poste.
#
#   docker compose -f docker-compose.hub.yml up
#
# AUCUNE construction d'image : Docker télécharge des images officielles
# (Python, PostgreSQL) puis le conteneur récupère lui-même le code TrustRate
# depuis GitHub et démarre. Tout vit dans Docker.
#
#   Le site        : http://localhost:8000
#   Le back-office : http://localhost:8000/admin   (admin / admin)
#
# Premier démarrage : ~2 minutes (installation dans le conteneur).
# Mise à jour après un changement du code sur GitHub :
#   docker compose -f docker-compose.hub.yml up --force-recreate
# Tout arrêter : Ctrl+C puis
#   docker compose -f docker-compose.hub.yml down        (garde la base)
#   docker compose -f docker-compose.hub.yml down -v     (efface aussi la base)
#
# Identifiants ci-dessous = développement local UNIQUEMENT.

name: trustrate

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit_local_dev
      POSTGRES_DB: credit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    image: python:3.12-slim
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://credit:credit_local_dev@db:5432/credit
      SEED_ON_START: "1"          # offres de démo au premier démarrage
      MIN_COHORT: "8"             # offres comparables minimum pour un verdict chiffré
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    command: >
      bash -c "
      apt-get update -qq &&
      apt-get install -yqq --no-install-recommends tesseract-ocr tesseract-ocr-fra curl ca-certificates &&
      curl -fsSL https://github.com/Coupain86/FL_Compar/archive/refs/heads/main.tar.gz -o /tmp/src.tgz &&
      mkdir -p /srv && tar xzf /tmp/src.tgz -C /srv --strip-components=1 &&
      cd /srv &&
      pip install --no-cache-dir -q -r requirements.txt &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    volumes:
      - pipcache:/root/.cache/pip
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/sante || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 180s

volumes:
  pgdata:
  pipcache:
