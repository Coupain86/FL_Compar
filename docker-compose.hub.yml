# Lancement local pour tester :
#   docker compose -f docker-compose.hub.yml up --build
# puis ouvrir http://localhost:8000  (back-office : http://localhost:8000/admin, admin/admin)
#
# Deux services :
#   db  — PostgreSQL officiel (image Docker Hub), données persistées dans un volume
#   web — l'application (construite depuis le Dockerfile), seedée avec des offres
#         de démonstration au premier démarrage (SEED_ON_START=1)
#
# Identifiants ci-dessous = développement local UNIQUEMENT. À changer avant toute
# exposition hors de votre machine.

name: comparateur-credit

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit_local_dev
      POSTGRES_DB: credit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://credit:credit_local_dev@db:5432/credit
      SEED_ON_START: "1"          # offres de démo + PDF d'exemple au 1er démarrage
      MIN_COHORT: "8"             # nb minimal d'offres comparables pour un verdict chiffré
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/sante"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  pgdata:
